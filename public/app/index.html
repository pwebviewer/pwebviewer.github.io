<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortableWeb</title>
  <link rel="manifest" href="/app/manifest.json">
  <meta name="theme-color" content="#1a1714">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PortableWeb">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">

  <style>
    /* ── Reset & tokens ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1714;
      --ink-soft:   #3a342d;
      --paper:      #f4ede0;
      --surface:    #ebe2d0;
      --border:     rgba(26,23,20,0.18);
      --border-mid: rgba(26,23,20,0.35);
      --accent:     #7c3aed;
      --accent2:    #2563eb;
      --accent3:    #20d6d2;
      --green:      #059669;
      --amber:      #d97706;
      --red:        #c0392b;
      --muted:      #756b5e;
      --radius:     10px;
      --serif:      ui-serif, "Iowan Old Style", "Apple Garamond", Baskerville, "Times New Roman", serif;
      --sans:       ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono:       ui-monospace, "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      --shadow:     0 2px 12px rgba(26,23,20,0.10), 0 1px 3px rgba(26,23,20,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink:        #f0e6d2;
        --ink-soft:   #cfc4ad;
        --paper:      #14110e;
        --surface:    #1f1a14;
        --border:     rgba(240,230,210,0.12);
        --border-mid: rgba(240,230,210,0.25);
        --muted:      #8a8170;
        --shadow:     0 2px 16px rgba(0,0,0,0.4);
      }
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    #root { height: 100%; display: flex; flex-direction: column; }

    /* ── Scrollable area ─────────────────────────────────────────────────── */
    .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── View switching ──────────────────────────────────────────────────── */
    .view { display: none; flex-direction: column; height: 100%; }
    .view.active { display: flex; }

    /* ── Dashboard ───────────────────────────────────────────────────────── */
    #view-dashboard {
      overflow: hidden;
    }

    .dash-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dash-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .dash-wordmark {
      font-family: var(--serif);
      font-size: 17px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .dash-badge {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 3px 8px;
      border: 1px solid var(--border-mid);
      border-radius: 4px;
    }

    .dash-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed var(--border-mid);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(124,58,237,0.04);
    }

    .drop-zone-icon {
      width: 48px;
      height: 48px;
      opacity: 0.35;
    }

    .drop-zone-title {
      font-family: var(--serif);
      font-size: 18px;
      font-style: italic;
      color: var(--ink);
    }

    .drop-zone-sub {
      font-size: 13px;
      color: var(--muted);
      max-width: 26em;
    }

    .btn-open-file {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      padding: 8px 18px;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-open-file:hover { background: var(--accent); }

    /* Tool grid */
    .tools-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    @media (min-width: 540px) {
      .tool-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
      font-family: inherit;
    }
    .tool-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: var(--border-mid);
    }
    .tool-card:active { transform: translateY(0); }

    .tool-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .tool-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.2;
    }
    .tool-desc {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Recent */
    .recent-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .recent-list { display: flex; flex-direction: column; gap: 1px; }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .recent-item:hover { background: var(--border); }

    .recent-icon {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .recent-info { flex: 1; min-width: 0; }
    .recent-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recent-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── Viewer ──────────────────────────────────────────────────────────── */
    #view-viewer {
      background: #000;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      height: 42px;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: var(--ink);
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .btn-back:hover { background: var(--surface); }

    .viewer-logo {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .viewer-title {
      flex: 1;
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-info {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .btn-info:hover { background: var(--surface); color: var(--ink); }

    .viewer-frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #viewer-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #fff;
    }

    /* ── Drop overlay (full-window) ──────────────────────────────────────── */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(124,58,237,0.12);
      backdrop-filter: blur(2px);
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #drop-overlay.active { display: flex; }

    .drop-overlay-inner {
      background: var(--paper);
      border: 2px dashed var(--accent);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      font-family: var(--serif);
      font-style: italic;
      font-size: 22px;
      color: var(--accent);
      box-shadow: var(--shadow);
    }

    /* ── Loading overlay ─────────────────────────────────────────────────── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(244,237,224,0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #loading.active { display: flex; }

    @media (prefers-color-scheme: dark) {
      #loading { background: rgba(20,17,14,0.88); }
      #drop-overlay { background: rgba(124,58,237,0.2); }
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--border-mid);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.06em;
    }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--mono);
      white-space: nowrap;
      z-index: 2000;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s;
      opacity: 0;
      pointer-events: none;
      max-width: calc(100vw - 40px);
      white-space: normal;
      text-align: center;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #toast.error { background: var(--red); }

    /* ── Dialog / Modal ──────────────────────────────────────────────────── */
    dialog {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 0;
      width: min(480px, calc(100vw - 32px));
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    dialog::backdrop {
      background: rgba(26,23,20,0.4);
      backdrop-filter: blur(2px);
    }
    @media (prefers-color-scheme: dark) {
      dialog::backdrop { background: rgba(0,0,0,0.6); }
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .dialog-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 18px;
    }
    .dialog-close {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .dialog-close:hover { background: var(--surface); color: var(--ink); }

    .dialog-body { padding: 20px; }

    /* Form */
    .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .form-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .form-input {
      padding: 8px 12px;
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      transition: border-color 0.12s;
      width: 100%;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .form-hint { font-size: 11px; color: var(--muted); }

    .dialog-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
    }

    .btn-primary {
      padding: 8px 20px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-primary:hover { background: var(--accent); }

    .btn-ghost {
      padding: 8px 16px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-ghost:hover { background: var(--surface); color: var(--ink); }

    /* Validation results */
    .validate-score {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 14px;
    }
    .validate-score.pass { background: rgba(5,150,105,0.1); color: var(--green); }
    .validate-score.fail { background: rgba(192,57,43,0.1); color: var(--red); }

    .validate-list { display: flex; flex-direction: column; gap: 6px; }

    .validate-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      background: var(--surface);
    }
    .validate-item.ok { }
    .validate-item.fail { background: rgba(192,57,43,0.06); }

    .validate-icon {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .validate-item.ok .validate-icon { color: var(--green); }
    .validate-item.fail .validate-icon { color: var(--red); }

    /* Bundle info panel */
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .info-table td { padding: 7px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    .info-table td:first-child {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      width: 36%;
      padding-right: 12px;
    }
    .info-table tr:last-child td { border-bottom: none; }

    /* Permissions badge list */
    .perm-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .perm-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      color: var(--ink-soft);
    }

    /* ── Responsive tweaks ───────────────────────────────────────────────── */
    @media (max-width: 400px) {
      .dash-body { padding: 16px 14px 32px; gap: 24px; }
      .drop-zone { padding: 28px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

<body>
<div id="root">

  <!-- ── Dashboard ───────────────────────────────────────────────────────── -->
  <div id="view-dashboard" class="view active">
    <div class="dash-header">
      <img src="/icons/icon.svg" class="dash-logo" alt="">
      <span class="dash-wordmark">PortableWeb</span>
      <span class="dash-badge">v0.1</span>
    </div>

    <div class="dash-body scroll">

      <!-- Drop / open zone -->
      <section>
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drop or choose a .pweb file to open">
          <!-- globe icon -->
          <svg class="drop-zone-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16 3C16 3 11 9 11 16s5 13 5 13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16 3c0 0 5 6 5 13s-5 13-5 13" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3" y1="16" x2="29" y2="16" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 10h24M4 22h24" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <div class="drop-zone-title">Open a .pweb bundle</div>
          <p class="drop-zone-sub" id="drop-zone-sub">
            Drag &amp; drop a .pweb file here, or choose one below
          </p>
          <button class="btn-open-file" id="btn-open">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v7M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1 9v1a1 1 0 001 1h8a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Choose .pweb file
          </button>
        </div>
      </section>

      <!-- Developer tools -->
      <section>
        <div class="tools-label">Developer tools</div>
        <div class="tool-grid">
          <button class="tool-card" id="btn-unpack">
            <div class="tool-icon" style="background:rgba(37,99,235,0.12);">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="2" y="10" width="14" height="6" rx="1.5" stroke="#2563eb" stroke-width="1.4"/><path d="M9 2v8M6 7l3 3 3-3" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
            <div class="tool-name">Unpack</div>
            <div class="tool-desc">Extract .pweb to a zip for editing</div>
          </button>

          <button class="tool-card" id="btn-pack">
            <div class="tool-icon" style="background:rgba(124,58,237,0.12);">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="2" y="2" width="14" height="6" rx="1.5" stroke="#7c3aed" stroke-width="1.4"/><path d="M9 16V8M6 11l3-3 3 3" stroke="#7c3aed" stroke-width="1.4" stroke-linecap="round"/></svg>
            </div>
            <div class="tool-name">Pack</div>
            <div class="tool-desc">Folder &rarr; .pweb bundle</div>
          </button>

          <button class="tool-card" id="btn-validate">
            <div class="tool-icon" style="background:rgba(5,150,105,0.12);">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><circle cx="9" cy="9" r="7" stroke="#059669" stroke-width="1.4"/><path d="M6 9l2 2 4-4" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="tool-name">Validate</div>
            <div class="tool-desc">Check a .pweb against the spec</div>
          </button>

          <button class="tool-card" id="btn-new">
            <div class="tool-icon" style="background:rgba(217,119,6,0.12);">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><rect x="2" y="2" width="14" height="14" rx="2" stroke="#d97706" stroke-width="1.4"/><path d="M9 6v6M6 9h6" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <div class="tool-name">New Project</div>
            <div class="tool-desc">Scaffold a starter .pweb</div>
          </button>
        </div>
      </section>

      <!-- Recent files -->
      <section id="recent-section" hidden>
        <div class="recent-label">Recent</div>
        <div class="recent-list" id="recent-list"></div>
      </section>

    </div>
  </div>

  <!-- ── Viewer ───────────────────────────────────────────────────────────── -->
  <div id="view-viewer" class="view">
    <div class="viewer-toolbar">
      <button class="btn-back" id="btn-back" title="Back to home" aria-label="Back">&#8592;</button>
      <img src="/icons/icon.svg" class="viewer-logo" alt="">
      <span class="viewer-title" id="viewer-title">Bundle</span>
      <button class="btn-info" id="btn-info" title="Bundle info" aria-label="Bundle info">&#8942;</button>
    </div>
    <div class="viewer-frame-wrap">
      <iframe
        id="viewer-frame"
        title="Bundle content"
        sandbox="allow-scripts allow-forms allow-pointer-lock allow-popups allow-modals allow-downloads"
        allow="fullscreen; pointer-lock"
      ></iframe>
    </div>
  </div>

</div><!-- #root -->

<script src="/app/jszip.min.js"></script>
<script>
/* ── PortableWeb PWA app ─────────────────────────────────────────────────── */
const App = (() => {
  /* State */
  let currentBundle = null; // { manifest, iframeSrc, blobUrls }

  /* ── Helpers ─────────────────────────────────────────────────────────── */

  const $ = (id) => document.getElementById(id);
  const el = (tag, attrs = {}, children = []) => {
    const e = document.createElement(tag);
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'class') e.className = v;
      else if (k.startsWith('data-')) e.dataset[k.slice(5)] = v;
      else e[k] = v;
    });
    children.forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
    return e;
  };

  function showToast(msg, isError = false) {
    const t = $('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), isError ? 5000 : 3000);
  }

  function showError(msg) { showToast(msg, true); }

  function showLoading(msg = 'Loading…') {
    $('loading-msg').textContent = msg;
    $('loading').classList.add('active');
  }

  function hideLoading() { $('loading').classList.remove('active'); }

  function setView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    $('view-' + name).classList.add('active');
  }

  function downloadBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  function revokeBundleUrls() {
    if (!currentBundle) return;
    Object.values(currentBundle.blobUrls || {}).forEach(u => URL.revokeObjectURL(u));
    if (currentBundle.iframeSrc) URL.revokeObjectURL(currentBundle.iframeSrc);
  }

  function getMime(path) {
    const ext = (path.split('.').pop() || '').toLowerCase();
    return {
      html: 'text/html', htm: 'text/html',
      css: 'text/css',
      js: 'application/javascript', mjs: 'application/javascript', cjs: 'application/javascript',
      json: 'application/json',
      svg: 'image/svg+xml',
      png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg',
      gif: 'image/gif', webp: 'image/webp', avif: 'image/avif',
      ico: 'image/x-icon',
      woff: 'font/woff', woff2: 'font/woff2', ttf: 'font/ttf', otf: 'font/otf',
      mp3: 'audio/mpeg', mp4: 'video/mp4', webm: 'video/webm',
      ogg: 'audio/ogg', wav: 'audio/wav',
      txt: 'text/plain', md: 'text/markdown',
    }[ext] || 'application/octet-stream';
  }

  /* Open a file picker that returns a File promise */
  function pickFile(accept) {
    return new Promise((resolve) => {
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = accept;
      inp.addEventListener('change', () => resolve(inp.files[0] || null));
      inp.click();
    });
  }

  /* ── Bundle open ──────────────────────────────────────────────────────── */

  async function openBundle(file) {
    showLoading('Opening bundle…');
    try {
      const arrayBuffer = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(arrayBuffer);

      /* Parse manifest */
      const mf = zip.file('manifest.json');
      if (!mf) throw new Error('Invalid bundle: missing manifest.json');
      const manifest = JSON.parse(await mf.async('text'));
      const required = ['spec_version', 'title', 'entry'];
      for (const k of required) {
        if (!manifest[k]) throw new Error(`manifest.json is missing required field: "${k}"`);
      }

      /* Build blob URL map for every file */
      const blobUrls = {};
      const tasks = [];
      zip.forEach((relPath, entry) => {
        if (entry.dir) return;
        tasks.push(
          entry.async('arraybuffer').then(data => {
            blobUrls[relPath] = URL.createObjectURL(new Blob([data], { type: getMime(relPath) }));
          })
        );
      });
      await Promise.all(tasks);

      /* Process entry HTML — rewrite relative src/href/url() to blob URLs */
      const entryPath = manifest.entry;
      const entryFile = zip.file(entryPath);
      if (!entryFile) throw new Error(`Entry file not found: ${entryPath}`);

      let html = await entryFile.async('text');
      html = rewriteHtml(html, blobUrls, entryPath);

      const iframeSrc = URL.createObjectURL(new Blob([html], { type: 'text/html' }));

      revokeBundleUrls();
      currentBundle = { manifest, iframeSrc, blobUrls };

      addRecent(file.name, manifest);
      showViewer();
    } catch (e) {
      showError(e.message);
    } finally {
      hideLoading();
    }
  }

  function rewriteHtml(html, blobUrls, entryPath) {
    const baseDir = entryPath.includes('/')
      ? entryPath.slice(0, entryPath.lastIndexOf('/') + 1)
      : '';

    const resolve = (url) => {
      if (!url) return null;
      if (/^(https?:|\/\/|data:|blob:|javascript:|#)/.test(url)) return null;
      const full = url.startsWith('/') ? url.slice(1) : baseDir + url;
      return blobUrls[full] || null;
    };

    /* src / href / action attributes */
    html = html.replace(/\b(src|href|action)=(["'])([^"']+)\2/gi, (m, attr, q, url) => {
      const b = resolve(url);
      return b ? `${attr}=${q}${b}${q}` : m;
    });

    /* CSS url() */
    html = html.replace(/url\((['"]?)([^)'"]+)\1\)/gi, (m, q, url) => {
      const b = resolve(url);
      return b ? `url(${q}${b}${q})` : m;
    });

    /* Inject sandbox-friendly <base> to avoid broken relative fetches */
    if (!/<base\b/i.test(html)) {
      html = html.replace(/<head([^>]*)>/i, '<head$1><base href="about:blank">');
    }

    return html;
  }

  function showViewer() {
    const { manifest, iframeSrc } = currentBundle;
    $('viewer-title').textContent = manifest.title;
    $('viewer-frame').src = iframeSrc;
    setView('viewer');
  }

  /* ── Developer tools ──────────────────────────────────────────────────── */

  async function doUnpack() {
    const file = await pickFile('.pweb,application/vnd.portableweb+zip');
    if (!file) return;
    const bytes = await file.arrayBuffer();
    const blob = new Blob([bytes], { type: 'application/zip' });
    downloadBlob(blob, file.name.replace(/\.pweb$/, '.zip'));
    showToast('Saved as ' + file.name.replace(/\.pweb$/, '.zip'));
  }

  async function doPack() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.webkitdirectory = true;
    inp.multiple = true;
    const files = await new Promise(r => { inp.addEventListener('change', () => r(Array.from(inp.files))); inp.click(); });
    if (!files.length) return;

    showLoading('Packing bundle…');
    try {
      const rootDir = files[0].webkitRelativePath.split('/')[0];
      const normalized = files
        .map(f => ({ file: f, path: f.webkitRelativePath.slice(rootDir.length + 1) }))
        .filter(f => f.path);

      if (!normalized.some(f => f.path === 'manifest.json')) {
        throw new Error('Folder must contain a manifest.json file');
      }

      const zip = new JSZip();
      /* mimetype must be first, uncompressed — EPUB convention */
      zip.file('mimetype', 'application/vnd.portableweb+zip', { compression: 'STORE' });

      for (const { file, path } of normalized) {
        if (path === 'mimetype') continue;
        zip.file(path, await file.arrayBuffer());
      }

      const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.portableweb+zip' });
      const name = rootDir + '.pweb';
      downloadBlob(blob, name);
      showToast('Created ' + name);
    } catch (e) {
      showError(e.message);
    } finally {
      hideLoading();
    }
  }

  async function doValidate() {
    const file = await pickFile('.pweb,application/vnd.portableweb+zip');
    if (!file) return;

    showLoading('Validating…');
    const checks = [];

    try {
      const ab = await file.arrayBuffer();
      const u8 = new Uint8Array(ab);

      /* 1 – ZIP signature */
      const isZip = u8[0] === 0x50 && u8[1] === 0x4B && u8[2] === 0x03 && u8[3] === 0x04;
      checks.push({ ok: isZip, label: 'Valid ZIP format' });
      if (!isZip) { checks.push({ ok: false, label: 'Cannot continue — not a valid ZIP' }); throw 0; }

      /* 2 – mimetype is first entry */
      const view = new DataView(ab);
      const fnLen = view.getUint16(26, true);
      const firstName = new TextDecoder().decode(new Uint8Array(ab, 30, fnLen));
      checks.push({ ok: firstName === 'mimetype', label: 'mimetype is the first entry' });

      /* 3 – mimetype is STORE (uncompressed) */
      checks.push({ ok: view.getUint16(8, true) === 0, label: 'mimetype uses STORE (uncompressed)' });

      const zip = await JSZip.loadAsync(ab);

      /* 4 – mimetype value */
      const mimetypeEntry = zip.file('mimetype');
      const mimeOk = mimetypeEntry && (await mimetypeEntry.async('text')).trim() === 'application/vnd.portableweb+zip';
      checks.push({ ok: !!mimeOk, label: 'mimetype value is application/vnd.portableweb+zip' });

      /* 5 – manifest.json present */
      const manifestEntry = zip.file('manifest.json');
      checks.push({ ok: !!manifestEntry, label: 'manifest.json exists' });
      if (!manifestEntry) throw 0;

      /* 6 – manifest.json parses */
      let manifest;
      try {
        manifest = JSON.parse(await manifestEntry.async('text'));
        checks.push({ ok: true, label: 'manifest.json is valid JSON' });
      } catch {
        checks.push({ ok: false, label: 'manifest.json is valid JSON' });
        throw 0;
      }

      /* 7-11 – required fields */
      for (const field of ['spec_version', 'id', 'version', 'title', 'entry']) {
        checks.push({ ok: !!manifest[field], label: `manifest.${field} present` });
      }

      /* 12 – entry file exists */
      if (manifest.entry) {
        checks.push({ ok: !!zip.file(manifest.entry), label: `Entry file exists (${manifest.entry})` });
      }
    } catch (_) { /* partial results are fine */ }

    hideLoading();

    const passed = checks.filter(c => c.ok).length;
    const total = checks.length;
    const allPass = passed === total;

    $('validate-title').textContent = `Validation — ${file.name}`;
    $('validate-results').innerHTML = `
      <div class="validate-score ${allPass ? 'pass' : 'fail'}">
        ${passed} / ${total} checks passed ${allPass ? '&#10003;' : ''}
      </div>
      <div class="validate-list">
        ${checks.map(c => `
          <div class="validate-item ${c.ok ? 'ok' : 'fail'}">
            <span class="validate-icon">${c.ok ? '&#10003;' : '&#10007;'}</span>
            <span>${c.label}</span>
          </div>
        `).join('')}
      </div>
    `;
    $('dialog-validate').showModal();
  }

  function doNew() { $('dialog-new').showModal(); }

  async function generateNewProject(data) {
    const { title, description, author, id } = data;
    const bundleId = id.trim() || `org.portableweb.${title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '')}`;
    const slug = title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '') || 'bundle';

    const manifest = {
      spec_version: '0.1',
      id: bundleId,
      version: '1.0.0',
      title: title.trim(),
      description: description.trim() || undefined,
      author: author.trim() ? { name: author.trim() } : undefined,
      entry: 'index.html',
      created: new Date().toISOString().split('T')[0],
    };
    // strip undefined keys
    Object.keys(manifest).forEach(k => manifest[k] === undefined && delete manifest[k]);

    const css = `/* ${title} */
:root {
  --ink:   #1a1714;
  --paper: #f4ede0;
  --serif: ui-serif, Georgia, "Times New Roman", serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: var(--serif); font-size: 18px; line-height: 1.6; }
main { max-width: 680px; margin: 3rem auto; padding: 0 1.5rem; }
h1 { font-size: 2.25rem; font-style: italic; font-weight: 400; margin-bottom: 1rem; }
p  { margin-bottom: 1rem; color: #3a342d; }
`;

    const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${escHtml(title)}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>${escHtml(title)}</h1>
    ${description ? `<p>${escHtml(description)}</p>` : ''}
    <p>Edit <code>index.html</code> to build your interactive document.<br>
       Run <code>pweb pack ./</code> or drag this folder into the PortableWeb viewer to bundle it.</p>
  </main>
  <script>
    console.log('${escJs(title)} — PortableWeb v0.1');
  <\/script>
</body>
</html>
`;

    const zip = new JSZip();
    zip.file('mimetype', 'application/vnd.portableweb+zip', { compression: 'STORE' });
    zip.file('manifest.json', JSON.stringify(manifest, null, 2));
    zip.file('index.html', html);
    zip.file('style.css', css);

    showLoading('Generating bundle…');
    try {
      const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.portableweb+zip' });
      downloadBlob(blob, slug + '.pweb');
      showToast('Downloaded ' + slug + '.pweb');
    } finally {
      hideLoading();
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  /* ── Bundle info panel ───────────────────────────────────────────────── */
  function showBundleInfo() {
    if (!currentBundle) return;
    const m = currentBundle.manifest;

    const perms = m.permissions;
    const permHtml = Array.isArray(perms) && perms.length
      ? `<div class="perm-list">${perms.map(p => `<span class="perm-badge">${escHtml(p)}</span>`).join('')}</div>`
      : '<span style="color:var(--muted);font-size:13px">none declared</span>';

    const rows = [
      ['Title',    escHtml(m.title)],
      ['ID',       `<code style="font-size:12px">${escHtml(m.id || '—')}</code>`],
      ['Version',  escHtml(m.version || '—')],
      ['Spec',     escHtml(m.spec_version || '—')],
      ['Entry',    `<code style="font-size:12px">${escHtml(m.entry || '—')}</code>`],
      ['Author',   escHtml((m.author?.name || m.author) || '—')],
      ['Permissions', permHtml],
    ].filter(([, v]) => v !== '—');

    $('info-body').innerHTML = `<table class="info-table">${
      rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')
    }</table>`;
    $('info-title').textContent = m.title;
    $('dialog-info').showModal();
  }

  /* ── Recent files ─────────────────────────────────────────────────────── */

  function addRecent(filename, manifest) {
    const list = getRecent();
    const entry = { filename, title: manifest.title, when: Date.now() };
    const updated = [entry, ...list.filter(r => r.filename !== filename)].slice(0, 8);
    try { localStorage.setItem('pweb-recent', JSON.stringify(updated)); } catch {}
    renderRecent();
  }

  function getRecent() {
    try { return JSON.parse(localStorage.getItem('pweb-recent') || '[]'); } catch { return []; }
  }

  function renderRecent() {
    const list = getRecent();
    const section = $('recent-section');
    const container = $('recent-list');
    if (!list.length) { section.hidden = true; return; }
    section.hidden = false;
    container.innerHTML = list.map(r => `
      <div class="recent-item">
        <img src="/icons/icon.svg" class="recent-icon" alt="">
        <div class="recent-info">
          <div class="recent-title">${escHtml(r.title)}</div>
          <div class="recent-meta">${escHtml(r.filename)} &middot; ${timeAgo(r.when)}</div>
        </div>
      </div>
    `).join('');
  }

  function timeAgo(ts) {
    const d = Date.now() - ts;
    if (d < 60000) return 'just now';
    if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    return Math.floor(d / 86400000) + 'd ago';
  }

  /* ── PWA: File Handling API (OS file-open) ───────────────────────────── */
  function setupFileHandling() {
    if (!('launchQueue' in window)) return;
    window.launchQueue.setConsumer(async (params) => {
      if (!params.files.length) return;
      try {
        const file = await params.files[0].getFile();
        await openBundle(file);
      } catch (e) {
        showError(String(e));
      }
    });
  }

  /* ── Drag-and-drop ────────────────────────────────────────────────────── */
  function setupDragDrop() {
    let enterCount = 0;
    const overlay = $('drop-overlay');
    const zone = $('drop-zone');

    const hasPweb = (dt) => {
      if (!dt) return false;
      for (const item of dt.items) {
        if (item.kind === 'file') return true;
      }
      return false;
    };

    document.addEventListener('dragenter', (e) => {
      if (!hasPweb(e.dataTransfer)) return;
      enterCount++;
      overlay.classList.add('active');
      zone.classList.add('dragover');
    });

    document.addEventListener('dragleave', (e) => {
      enterCount = Math.max(0, enterCount - 1);
      if (enterCount === 0) {
        overlay.classList.remove('active');
        zone.classList.remove('dragover');
      }
    });

    document.addEventListener('dragover', (e) => e.preventDefault());

    document.addEventListener('drop', async (e) => {
      e.preventDefault();
      enterCount = 0;
      overlay.classList.remove('active');
      zone.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (file.name.endsWith('.pweb') || file.type.includes('portableweb')) {
        await openBundle(file);
      } else {
        showError('Please drop a .pweb file');
      }
    });
  }

  /* ── Mobile hint ──────────────────────────────────────────────────────── */
  function setupMobileHint() {
    const isTouch = navigator.maxTouchPoints > 0;
    if (isTouch) {
      $('drop-zone-sub').textContent = 'Tap the button below to choose a .pweb file from your device';
    }
  }

  /* ── Event wiring ─────────────────────────────────────────────────────── */
  function setupEvents() {
    $('btn-open').addEventListener('click', async () => {
      const file = await pickFile('.pweb,application/vnd.portableweb+zip');
      if (file) openBundle(file);
    });
    $('drop-zone').addEventListener('click', async (e) => {
      if (e.target !== $('btn-open') && !$('btn-open').contains(e.target)) {
        const file = await pickFile('.pweb,application/vnd.portableweb+zip');
        if (file) openBundle(file);
      }
    });
    $('drop-zone').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const file = await pickFile('.pweb,application/vnd.portableweb+zip');
        if (file) openBundle(file);
      }
    });

    $('btn-unpack').addEventListener('click', doUnpack);
    $('btn-pack').addEventListener('click', doPack);
    $('btn-validate').addEventListener('click', doValidate);
    $('btn-new').addEventListener('click', doNew);

    $('btn-back').addEventListener('click', () => {
      $('viewer-frame').src = 'about:blank';
      revokeBundleUrls();
      currentBundle = null;
      setView('dashboard');
    });

    $('btn-info').addEventListener('click', showBundleInfo);

    $('form-new').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      $('dialog-new').close();
      await generateNewProject(data);
    });

    /* Close buttons on dialogs */
    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => {
        const dlg = $(btn.dataset.close);
        if (dlg) dlg.close();
      });
    });

    /* Close dialog on backdrop click */
    document.querySelectorAll('dialog').forEach(dlg => {
      dlg.addEventListener('click', (e) => {
        if (e.target === dlg) dlg.close();
      });
    });
  }

  /* ── Service Worker registration ─────────────────────────────────────── */
  function registerSW() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/app/sw.js').catch(() => {});
    }
  }

  /* ── Init ─────────────────────────────────────────────────────────────── */
  function init() {
    setupFileHandling();
    setupDragDrop();
    setupMobileHint();
    setupEvents();
    renderRecent();
    registerSW();
  }

  return { init };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
